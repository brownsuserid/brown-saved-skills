default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  mcps:
    - name: playwright
      description: Browser automation via Playwright — headless Chrome control for web scraping, form filling, screenshots
      type: stdio
      command: npx
      args: ["@playwright/mcp@latest"]

    - name: beeper
      description: Unified messaging via Beeper Desktop — iMessage, WhatsApp, Signal, Telegram, Discord, Slack, etc.
      type: http
      url: "http://localhost:23373/v0/mcp"
      note: Requires Beeper Desktop running with API enabled (Settings → Developers)

  skills:
    # --- Core Library (Brain-Bridge-AI/core-library) ---
    - name: airtable-config
      description: Config-driven Airtable loader — YAML configs, helpers (api_url, resolve_assignee, resolve_status)
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/airtable-config/README.md

    - name: calendar-availability
      description: Calendar availability engine — finds open slots across Google and Apple calendars
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/calendar-availability/README.md

    - name: search-airtable
      description: Generic Airtable search engines (orgs, contacts, deals) — config-driven
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/search-airtable/README.md

    - name: using-gamma
      description: Generate presentations via Gamma API with Playwright automation
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/using-gamma/SKILL.md
      requires: [mcp:playwright]

    - name: using-gog
      description: Config-driven Google Workspace CLI engine (gog v0.9.0) — Gmail, Calendar, Drive, Docs, Sheets, and more
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/using-gog/SKILL.md

    - name: using-notebooklm
      description: Browser automation for Google NotebookLM — query notebooks, generate audio overviews
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/using-notebooklm/SKILL.md
      requires: [mcp:playwright]

    - name: using-beeper
      description: Beeper Desktop MCP wrappers for unified messaging (read, send, find, write)
      source: https://github.com/Brain-Bridge-AI/core-library/blob/main/skills/using-beeper/reference.md
